services:
  - type: web
    name: campusflow-backend
    env: python
    plan: free
    region: oregon
    branch: main
    path: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    pythonVersion: 3.11.4
